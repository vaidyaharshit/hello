<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Dhoni Ultimate UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
    color:white;
    transition:0.5s;
}

/* VIDEO BACKGROUND */
video{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* DARK MODE */
.dark{
    background:#111;
    color:#fff;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.6);
}

nav h1{
    color:#ffcc00;
}

nav button{
    padding:8px 15px;
    border:none;
    background:#ffcc00;
    cursor:pointer;
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px;
    animation:fadeIn 2s;
}

.hero h2{
    font-size:50px;
    color:#ffcc00;
}

/* IMAGE */
.hero img{
    width:250px;
    margin-top:20px;
    border-radius:15px;
    transition:0.5s;
}

.hero img:hover{
    transform:scale(1.1) rotate(3deg);
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:40px;
}

.box{
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}

.box:hover{
    transform:scale(1.1);
    background:#ffcc00;
    color:#000;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.card{
    width:200px;
    height:120px;
    perspective:1000px;
}

.inner{
    width:100%;
    height:100%;
    transition:0.6s;
    transform-style:preserve-3d;
    position:relative;
}

.card:hover .inner{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    backface-visibility:hidden;
}

.front{background:#fff;color:#000;}
.back{background:#ffcc00;color:#000;transform:rotateY(180deg);}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.6);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero h2{font-size:30px;}
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
    <h1>🏏 MS Dhoni</h1>
    <button onclick="toggleMode()">🌙 Mode</button>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>Captain Cool 😎</h2>
    <p>Legend | Finisher | Leader</p>
    <img src="https://i.pinimg.com/736x/08/43/85/0843857968e99da2165549d8f036ba6d.jpg?nii=t">
</section>

<!-- STATS -->
<section class="stats" id="stats"></section>

<!-- CARDS -->
<section class="cards">
    <div class="card">
        <div class="inner">
            <div class="front">Helicopter 🚁</div>
            <div class="back">Shot King</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="front">2011 🏆</div>
            <div class="back">Winning Six</div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="front">CSK 💛</div>
            <div class="back">Thala</div>
        </div>
    </div>
</section>

<footer>
    <p>Ultimate Tribute UI 🚀</p>
</footer>

<script>
// DARK MODE
function toggleMode(){
    document.body.classList.toggle("dark");
}

// FAKE BACKEND DATA (Hackathon trick 😎)
const data = [
    {title:"ICC Trophies", value:"3 🏆"},
    {title:"World Cups", value:"2 🌍"},
    {title:"IPL Titles", value:"5 💛"},
    {title:"Finishes", value:"100+ 🔥"}
];

// LOAD DATA
let output="";
data.forEach(d=>{
    output+=`
    <div class="box">
        <h3>${d.title}</h3>
        <p>${d.value}</p>
    </div>`;
});

document.getElementById("stats").innerHTML=output;
</script>

</body>
</html>
