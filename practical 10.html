<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Smart Webpage</title>
    <style>
        body { margin:0; font-family:Arial; transition:0.3s; overflow:hidden; }
        header {
            background: linear-gradient(to right,#4facfe,#00f2fe);
            color:white; text-align:center; padding:15px;
        }
        .container { display:flex; height:90vh; }
        nav {
            width:25%; background:#222; color:white; padding:15px;
        }
        nav a {
            display:block; color:white; padding:10px;
            text-decoration:none; margin:5px 0;
            background:#333; border-radius:5px; cursor:pointer;
        }
        nav a:hover { background:#555; transform:scale(1.05); }
        iframe { width:75%; border:none; }

        button {
            padding:10px; margin:5px;
            border:none; background:#4facfe;
            color:white; border-radius:5px; cursor:pointer;
        }

        /* Home background animation */
        .animated-bg {
            width:100%; height:100%; position:absolute; top:0; left:0; z-index:-1;
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #f9f047);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }
    </style>
</head>

<body id="mainBody">

<header>
    <h1>🚀 Ultimate Smart Webpage</h1>
    <p>Map | Weather | Game | Interactive UI</p>
</header>

<div class="container">

<nav>
    <h3>📌 Menu</h3>
    <a onclick="loadHome()">🏠 Home</a>
    <a onclick="loadMap()">🗺️ Map</a>
    <a onclick="loadGame()">🎮 Game</a>
    <a onclick="loadExternal()">🌍 External</a>
    <a onclick="toggleMode()">🌙 Toggle Mode</a>
</nav>

<iframe id="frame"></iframe>

</div>

<script>
var frame = document.getElementById("frame");

// HOME with animated background
function loadHome(){
frame.srcdoc = `
<html>
<body style='margin:0; text-align:center; font-family:Arial; overflow:hidden;'>
<div class='animated-bg'></div>
<h1 style='color:white; text-shadow:2px 2px 10px black;'>🌍 Smart Dashboard</h1>

<input type='text' id='loc' placeholder='Enter location'><br>
<button onclick='searchMap()'>🔍 Search Map</button>
<button onclick='getLocation()'>📍 My Location</button>
<button onclick='getWeather()'>🌦️ Weather</button>

<h2 id='clock' style='color:white; text-shadow:1px 1px 5px black;'></h2>
<p id='weather' style='color:white; text-shadow:1px 1px 5px black;'></p>

<script>
function searchMap(){
var place=document.getElementById('loc').value;
if(place.trim()!=''){
parent.document.getElementById('frame').srcdoc =
'<html><body style="margin:0;"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3670.520991938569!2d79.08493881543988!3d21.14580008591366!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bd4c6c40d1a1a11%3A0x6c4f1d9c1245f4e!2s'+encodeURIComponent(place)+'!5e0!3m2!1sen!2sin!4v1699505123456!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe></body></html>';
}else{
alert("Enter a location!");
}
}

function getLocation(){
navigator.geolocation.getCurrentPosition(function(pos){
parent.document.getElementById('frame').srcdoc =
'<html><body style="margin:0;"><iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3670.520991938569!2d'+pos.coords.longitude+'!3d'+pos.coords.latitude+'!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!5e0!3m2!1sen!2sin!4v1699505123456!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe></body></html>';
});
}

function getWeather(){
var place=document.getElementById('loc').value;
document.getElementById('weather').innerHTML=
'Weather in '+place+' 🌡️: Sunny (Demo)';
}

setInterval(()=>{document.getElementById('clock').innerHTML=new Date().toLocaleTimeString();},1000);
<\/script>

<style>
.animated-bg {
width:100%; height:100%; position:absolute; top:0; left:0; z-index:-1;
background: linear-gradient(-45deg, #4facfe, #00f2fe, #43e97b, #f9f047);
background-size: 400% 400%;
animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
</style>
</body>
</html>`;
}

// MAP proper embed
function loadMap(){
frame.srcdoc = `
<html>
<body style='margin:0;'>
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3670.520991938569!2d79.08493881543988!3d21.14580008591366!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bd4c6c40d1a1a11%3A0x6c4f1d9c1245f4e!2sNagpur!5e0!3m2!1sen!2sin!4v1699505123456!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</body>
</html>`;
}

// GAME
function loadGame(){
frame.srcdoc = `
<html>
<body style='text-align:center; font-family:Arial;'>
<h1>🎮 Guess The Number</h1>
<p>Guess number between 1-10</p>

<input type='number' id='guess'>
<button onclick='check()'>Try</button>

<p id='result'></p>

<script>
var num = Math.floor(Math.random()*10)+1;
function check(){
var g = document.getElementById('guess').value;
if(g == num){
document.getElementById('result').innerHTML='🎉 Correct!';
} else {
document.getElementById('result').innerHTML='❌ Try again!';
}
}
<\/script>
</body>
</html>`;
}

// EXTERNAL
function loadExternal(){
frame.src = "https://example.com";
}

// DARK MODE
function toggleMode(){
var b=document.getElementById('mainBody');
if(b.style.background=='black'){
b.style.background='white'; b.style.color='black';
}else{
b.style.background='black'; b.style.color='white';
}
}

// Default load
loadHome();
</script>

</body>
</html>
